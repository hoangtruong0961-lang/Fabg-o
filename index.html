<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#020617" />
    <meta name="description" content="Chơi game nhập vai với AI" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="ARK V5" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/pwa-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/pwa-512x512.png" />
    <title>Ark v2 SillyTavern</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Roboto:wght@300;400;700&family=Open+Sans:wght@300;400;600;700&family=Montserrat:wght@300;400;600;700&family=Oswald:wght@300;400;700&family=Playfair+Display:wght@400;700&family=Lora:wght@400;700&family=Noto+Sans+Vietnamese:wght@300;400;700&family=Be+Vietnam+Pro:wght@300;400;600;700&family=JetBrains+Mono:wght@300;400;700&family=IBM+Plex+Mono:wght@300;400;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['var(--font-system)', 'Lora', 'serif'],
              serif: ['Playfair Display', 'serif'],
              mono: ['IBM Plex Mono', 'JetBrains Mono', 'monospace'],
            },
            colors: {
              mystic: {
                950: '#020617', // Slate 950 - Deepest
                900: '#030712', // Darker than Slate 900
                800: '#0f172a', // Slate 900
                accent: '#38bdf8', // Sky 400
                glow: 'rgba(56, 189, 248, 0.5)'
              }
            },
            animation: {
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --font-system: 'Lora', serif;
        --font-size-base: 16px;
        --neu-bg-light: #d6d3d1; /* stone-300 */
        --neu-shadow-dark-light: #b0aba8;
        --neu-shadow-light-light: #ffffff;
        
        --neu-bg-dark: #090f1d; /* elegant dark navy-slate */
        --neu-shadow-dark-dark: #010307;
        --neu-shadow-light-dark: #15213b;
      }
      html, body, #root {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
      }
      html {
        font-family: var(--font-system), sans-serif;
        font-size: var(--font-size-base);
      }
      @media (max-width: 767px) {
        html {
          font-size: 10px !important;
          zoom: 0.8;
        }
      }
      body {
        font-family: var(--font-system), sans-serif;
        font-size: 1rem;
        overflow: hidden; 
      }
      * {
        font-family: inherit;
      }
      
      /* --- Neomorphism Utility Styles --- */
      
      /* Neu Flat / Extruded outwardly (Embossed) */
      .neu-flat {
        background: linear-gradient(135deg, #e5e2df, #c9c5c2);
        box-shadow: 
          6px 6px 14px var(--neu-shadow-dark-light), 
          -6px -6px 14px var(--neu-shadow-light-light);
        border: 1px solid rgba(255, 255, 255, 0.5);
      }
      .dark .neu-flat {
        background: linear-gradient(135deg, #0e182e, #04060c);
        box-shadow: 
          8px 8px 18px var(--neu-shadow-dark-dark), 
          -8px -8px 18px var(--neu-shadow-light-dark);
        border: 1px solid rgba(255, 255, 255, 0.03);
      }
      
      /* Neu Convex - Slightly domed */
      .neu-convex {
        background: linear-gradient(135deg, #eae7e4, #c3beba);
        box-shadow: 
          6px 6px 14px var(--neu-shadow-dark-light), 
          -6px -6px 14px var(--neu-shadow-light-light);
        border: 1px solid rgba(255, 255, 255, 0.6);
      }
      .dark .neu-convex {
        background: linear-gradient(135deg, #101c34, #03050a);
        box-shadow: 
          8px 8px 18px var(--neu-shadow-dark-dark), 
          -8px -8px 18px var(--neu-shadow-light-dark);
        border: 1px solid rgba(255, 255, 255, 0.04);
      }

      /* Neu Concave - Slightly hollowed */
      .neu-concave {
        background: linear-gradient(135deg, #c3beba, #eae7e4);
        box-shadow: 
          inset 5px 5px 12px var(--neu-shadow-dark-light), 
          inset -5px -5px 12px var(--neu-shadow-light-light);
        border: 1px solid rgba(0, 0, 0, 0.04);
      }
      .dark .neu-concave {
        background: linear-gradient(135deg, #03050a, #101c34);
        box-shadow: 
          inset 5px 5px 12px var(--neu-shadow-dark-dark), 
          inset -5px -5px 12px var(--neu-shadow-light-dark);
        border: 1px solid rgba(255, 255, 255, 0.01);
      }

      /* Neu Inset / Sunken inwardly */
      .neu-inset {
        background: linear-gradient(135deg, #c5c1bd, #dfdbd8);
        box-shadow: 
          inset 6px 6px 12px var(--neu-shadow-dark-light), 
          inset -6px -6px 12px var(--neu-shadow-light-light);
        border: 1px solid rgba(0, 0, 0, 0.05);
      }
      .dark .neu-inset {
        background: linear-gradient(135deg, #03050a, #0e182e);
        box-shadow: 
          inset 6px 6px 14px var(--neu-shadow-dark-dark), 
          inset -6px -6px 14px var(--neu-shadow-light-dark);
        border: 1px solid rgba(255, 255, 255, 0.01);
      }
      
      /* Small Neu Flat - Good for quick buttons, badges, small items */
      .neu-sm-flat {
        background: linear-gradient(135deg, #e5e2df, #c9c5c2);
        box-shadow: 
          3px 3px 7px var(--neu-shadow-dark-light), 
          -3px -3px 7px var(--neu-shadow-light-light);
        border: 1px solid rgba(255, 255, 255, 0.5);
      }
      .dark .neu-sm-flat {
        background: linear-gradient(135deg, #0e182e, #04060c);
        box-shadow: 
          3px 3px 8px var(--neu-shadow-dark-dark), 
          -3px -3px 8px var(--neu-shadow-light-dark);
        border: 1px solid rgba(255, 255, 255, 0.02);
      }
      .neu-sm-flat:hover {
        background: linear-gradient(135deg, #eae7e4, #cecac7);
      }
      .neu-sm-flat:active, .neu-sm-flat.active {
        background: linear-gradient(135deg, #c9c5c2, #e5e2df);
        box-shadow: 
          inset 2px 2px 5px var(--neu-shadow-dark-light), 
          inset -2px -2px 5px var(--neu-shadow-light-light);
      }
      .dark .neu-sm-flat:hover {
        background: linear-gradient(135deg, #121e3c, #05080f);
      }
      .dark .neu-sm-flat:active, .dark .neu-sm-flat.active {
        background: linear-gradient(135deg, #04060c, #0e182e);
        box-shadow: 
          inset 2px 2px 6px var(--neu-shadow-dark-dark), 
          inset -2px -2px 6px var(--neu-shadow-light-dark);
      }

      /* Small Neu Inset - Good for inputs, small indicators */
      .neu-sm-inset {
        background: linear-gradient(135deg, #c8c4c1, #e5e2df);
        box-shadow: 
          inset 3px 3px 6px var(--neu-shadow-dark-light), 
          inset -3px -3px 6px var(--neu-shadow-light-light);
        border: 1px solid rgba(0, 0, 0, 0.04);
      }
      .dark .neu-sm-inset {
        background: linear-gradient(135deg, #03050a, #0e182e);
        box-shadow: 
          inset 3px 3px 8px var(--neu-shadow-dark-dark), 
          inset -3px -3px 8px var(--neu-shadow-light-dark);
        border: 1px solid rgba(255, 255, 255, 0.01);
      }

      /* Neu Interactive Button */
      .neu-btn {
        background: linear-gradient(135deg, #e5e2df, #c9c5c2);
        box-shadow: 
          4px 4px 10px var(--neu-shadow-dark-light), 
          -4px -4px 10px var(--neu-shadow-light-light);
        border: 1px solid rgba(255, 255, 255, 0.5);
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .neu-btn:hover {
        background: linear-gradient(135deg, #eae7e4, #cecac7);
        box-shadow: 
          5px 5px 12px var(--neu-shadow-dark-light), 
          -5px -5px 12px var(--neu-shadow-light-light);
        transform: translateY(-1px);
      }
      .neu-btn:active, .neu-btn.active {
        background: linear-gradient(135deg, #c9c5c2, #e5e2df);
        box-shadow: 
          inset 4px 4px 8px var(--neu-shadow-dark-light), 
          inset -4px -4px 8px var(--neu-shadow-light-light);
        transform: translateY(1px);
      }
      .dark .neu-btn {
        background: linear-gradient(135deg, #0e182e, #04060c);
        box-shadow: 
          4px 4px 12px var(--neu-shadow-dark-dark), 
          -4px -4px 12px var(--neu-shadow-light-dark);
        border: 1px solid rgba(255, 255, 255, 0.03);
      }
      .dark .neu-btn:hover {
        background: linear-gradient(135deg, #121e3c, #05080f);
        box-shadow: 
          5px 5px 14px var(--neu-shadow-dark-dark), 
          -5px -5px 14px var(--neu-shadow-light-dark);
      }
      .dark .neu-btn:active, .dark .neu-btn.active {
        background: linear-gradient(135deg, #04060c, #0e182e);
        box-shadow: 
          inset 4px 4px 10px var(--neu-shadow-dark-dark), 
          inset -4px -4px 10px var(--neu-shadow-light-dark);
      }

      /* Custom scrollbar for future text logs */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #1e293b;
      }
      ::-webkit-scrollbar-thumb {
        background: #475569;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
